<h2>侧边栏展示方式</h2>
<p class="subtitle">侧边栏是始终展开显示文字，还是支持折叠成图标模式？</p>

<div class="cards">

  <div class="card" data-choice="collapsible" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:0;overflow:hidden;border-radius:8px;min-height:210px;">
      <div style="display:flex;height:210px;font-size:11px;gap:0;">

        <!-- 展开态 -->
        <div style="flex:1;display:flex;">
          <div style="width:72px;background:#0f172a;padding:12px 8px;display:flex;flex-direction:column;gap:5px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
              <div style="width:22px;height:22px;background:#0f766e;border-radius:5px;flex-shrink:0;"></div>
              <div style="font-size:9px;color:#e2e8f0;font-weight:700;">Alpha<br>Pulse</div>
            </div>
            <div style="padding:5px 7px;background:rgba(15,118,110,0.25);border-radius:5px;color:#5eead4;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>驾驶舱</div>
            <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>图表</div>
            <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>复盘</div>
            <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>市场</div>
            <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>交易</div>
            <div style="flex:1;"></div>
            <div style="padding:5px 7px;color:#475569;font-size:9px;text-align:center;">⟨</div>
          </div>
          <div style="flex:1;background:#f1f5f9;padding:8px;display:flex;flex-direction:column;gap:6px;">
            <div style="font-size:9px;color:#94a3b8;text-align:center;margin-top:4px;">展开态 (220px)</div>
            <div style="flex:1;background:#fff;border-radius:5px;border:1px solid #e2e8f0;"></div>
          </div>
        </div>

        <div style="width:1px;background:#e2e8f0;"></div>

        <!-- 折叠态 -->
        <div style="flex:1;display:flex;">
          <div style="width:36px;background:#0f172a;padding:8px 6px;display:flex;flex-direction:column;gap:6px;align-items:center;">
            <div style="width:20px;height:20px;background:#0f766e;border-radius:4px;margin-bottom:6px;"></div>
            <div style="width:20px;height:20px;background:rgba(15,118,110,0.3);border-radius:4px;"></div>
            <div style="width:20px;height:20px;background:rgba(255,255,255,0.08);border-radius:4px;"></div>
            <div style="width:20px;height:20px;background:rgba(255,255,255,0.08);border-radius:4px;"></div>
            <div style="width:20px;height:20px;background:rgba(255,255,255,0.08);border-radius:4px;"></div>
            <div style="width:20px;height:20px;background:rgba(255,255,255,0.08);border-radius:4px;"></div>
            <div style="flex:1;"></div>
            <div style="font-size:9px;color:#475569;">⟩</div>
          </div>
          <div style="flex:1;background:#f1f5f9;padding:8px;display:flex;flex-direction:column;gap:6px;">
            <div style="font-size:9px;color:#94a3b8;text-align:center;margin-top:4px;">折叠态 (48px)</div>
            <div style="flex:1;background:#fff;border-radius:5px;border:1px solid #e2e8f0;"></div>
          </div>
        </div>

      </div>
    </div>
    <div class="card-body">
      <h3>可折叠侧边栏（推荐）</h3>
      <p>默认展开显示图标+文字，点击箭头折叠成纯图标模式。看图表时折叠可以多出 170px 内容宽度，灵活性最高。</p>
    </div>
  </div>

  <div class="card" data-choice="fixed" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:0;overflow:hidden;border-radius:8px;min-height:210px;">
      <div style="display:flex;height:210px;font-size:11px;">
        <div style="width:80px;background:#0f172a;padding:12px 8px;display:flex;flex-direction:column;gap:5px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
            <div style="width:22px;height:22px;background:#0f766e;border-radius:5px;flex-shrink:0;"></div>
            <div style="font-size:9px;color:#e2e8f0;font-weight:700;">Alpha<br>Pulse</div>
          </div>
          <div style="padding:5px 7px;background:rgba(15,118,110,0.25);border-radius:5px;color:#5eead4;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>驾驶舱</div>
          <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>图表</div>
          <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>复盘</div>
          <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>市场</div>
          <div style="padding:5px 7px;color:#64748b;font-size:9px;display:flex;align-items:center;gap:5px;"><span>▪</span>交易</div>
        </div>
        <div style="flex:1;background:#f1f5f9;padding:8px;display:flex;flex-direction:column;gap:6px;">
          <div style="flex:1;background:#fff;border-radius:5px;border:1px solid #e2e8f0;"></div>
          <div style="height:40px;background:#fff;border-radius:5px;border:1px solid #e2e8f0;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>固定展开</h3>
      <p>始终显示图标+文字，不可折叠。布局稳定，不会因为折叠状态导致内容区宽度跳变，但图表页会少一些横向空间。</p>
    </div>
  </div>

</div>
