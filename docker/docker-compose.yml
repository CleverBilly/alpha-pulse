version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: alpha-pulse-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alpha_pulse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: alpha-pulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: alpha-pulse-backend
    restart: unless-stopped
    environment:
      APP_MODE: dev
      GIN_MODE: debug
      APP_PORT: 8080
      MYSQL_DSN: root:root@tcp(mysql:3306)/alpha_pulse?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      MARKET_SNAPSHOT_CACHE_TTL: 5
      ANALYSIS_VIEW_CACHE_TTL: 15
      MARKET_SYMBOLS: BTCUSDT,ETHUSDT
      AUTO_MIGRATE: true
      ENABLE_REDIS_CACHE: true
      ENABLE_STREAM_COLLECTOR: true
      ENABLE_SCHEDULER: true
      ALLOW_MOCK_BINANCE_DATA: true
      SCHEDULER_INTERVAL_SECONDS: 60
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: alpha-pulse-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data:
